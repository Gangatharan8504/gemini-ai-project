<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gemini AI Chatbot | Portfolio Project</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Markdown renderer -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="app">
    <aside class="sidebar">
        <div>
            <h2><i class="fa-solid fa-robot"></i> AI Chat</h2>
            <p class="small">Gemini-powered portfolio chatbot</p>
        </div>

        <div class="login-box">
            <label>Your Name</label>
            <div class="login-row">
                <input type="text" id="usernameInput" placeholder="Enter name">
                <button onclick="loginUser()">Login</button>
            </div>
            <p id="loginStatus">Guest mode</p>
        </div>

        <button class="side-btn" onclick="newChat()">
            <i class="fa-solid fa-plus"></i> New Chat
        </button>

        <button class="side-btn" onclick="clearHistory()">
            <i class="fa-solid fa-trash"></i> Clear History
        </button>

        <button class="side-btn" onclick="toggleDarkMode()">
            <i class="fa-solid fa-moon"></i> Dark Mode
        </button>

        <div class="footer-note">
            Built with Flask + Gemini API
        </div>
    </aside>

    <main class="chat-area">
        <header class="topbar">
            <div>
                <h1>Gemini AI Assistant</h1>
                <p>Ask coding, career, project, or study questions.</p>
            </div>
            <span class="status-dot">● Online</span>
        </header>

        <section id="chatBox" class="chat-box"></section>

        <div id="typingIndicator" class="typing hidden">
            <span></span><span></span><span></span>
        </div>

        <section class="input-area">
            <button class="icon-btn" onclick="startVoiceInput()" title="Voice Input">
                <i class="fa-solid fa-microphone"></i>
            </button>

            <textarea id="messageInput" placeholder="Type your message..." rows="1"></textarea>

            <button class="send-btn" onclick="sendMessage()">
                Send <i class="fa-solid fa-paper-plane"></i>
            </button>
        </section>
    </main>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
