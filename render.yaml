services:
  - type: web
    name: gemini-ai-chat-portfolio
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: GEMINI_MODEL
        value: models/gemini-2.5-flash
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
